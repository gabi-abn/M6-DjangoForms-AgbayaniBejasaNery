{% extends 'MyInventoryApp/base.html' %}
{% load static %}

{% block content %}
<div class="col-12">
    <h2>Add Water Bottle</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>SKU</label>
            <input type="text" class="form-control" name="SKU">
        </div>
        <div class="form-group">
            <label>Brand</label>
            <input type="text" class="form-control" name="brand">
        </div>
        <div class="form-group">
            <label>Cost</label>
            <input type="text" class="form-control" name="cost">
        </div>
        <div class="form-group">
            <label>Size</label>
            <input type="text" class="form-control" name="size">
        </div>
        <div class="form-group">
            <label>Mouth Size</label>
            <input type="text" class="form-control" name="mouth_size">
        </div>
        <div class="form-group">
            <label>Color</label>
            <input type="text" class="form-control" name="color">
        </div>
        <div class="form-group">
            <label>Supplier</label>
            <select class="form-control" name="supplied_by">
                {% for s in suppliers %}
                <option value="{{ s.id }}">{{ s.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Quantity</label>
            <input type="text" class="form-control" name="current_quantity">
        </div>
        <br>
        <input type="submit" class="btn btn-primary" name="Submit">
    </form>
</div>
{% endblock %}
