{% extends 'MyInventoryApp/base.html' %}
{% block content %}

<div class="col-12">

<h2>Change Password</h2>

{% if error %}
<div class="alert alert-{{message_tags}}">
    {{ error }}
</div>

{% endif %}
<form method="POST">
    {% csrf_token %}

    <input name="current_password" class="form-control" placeholder="Current Password"><br>
    <input name="new_password" class="form-control" placeholder="New Password"><br>
    <input name="confirm_password" class="form-control" placeholder="Confirm Password"><br>

    <button class="btn btn-primary">Update</button>
</form>

<a href="{% url 'manage_account' account.id %}" class="btn btn-secondary mt-2">Cancel</a>

</div>

{% endblock %}
